name: Android CI

on:
  push:
  pull_request:

env:
  # Opt in early to Node.js 24 runtime for JavaScript actions.
  # This prevents breakage from the Node 20 deprecation on GitHub-hosted runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew assembleDebug
